function xhr(method,table,body,qs,upsert){
  return new Promise((res,rej)=>{
    const x=new XMLHttpRequest();
    x.open(method,SB_URL+'/rest/v1/'+table+(qs?'?'+qs:''),true);
    x.setRequestHeader('apikey',SB_KEY);
    x.setRequestHeader('Authorization','Bearer '+SB_KEY);
    x.setRequestHeader('Content-Type','application/json');
    x.setRequestHeader('Prefer',upsert?'resolution=merge-duplicates,return=representation':'return=representation');
    x.timeout=12000;
    x.onload=()=>{if(x.status>=200&&x.status<300){try{res(JSON.parse(x.responseText||'[]'));}catch{res([]);}}else{rej(new Error('HTTP '+x.status));}}
    x.onerror=()=>rej(new Error('Netzwerkfehler'));
    x.ontimeout=()=>rej(new Error('Timeout'));
    x.send(body?JSON.stringify(body):null);
  });
}
const sb={
  get:(t,q)=>xhr('GET',t,null,q),
  post:(t,d)=>xhr('POST',t,d),
  patch:(t,d,q)=>xhr('PATCH',t,d,q),
  del:(t,q)=>xhr('DELETE',t,null,q),
  upsert:(t,d)=>xhr('POST',t,d,null,true),
};

async function sbLoad(){
  const [users,cats,items,log]=await Promise.all([
    sb.get('inv_users','select=*'),
    sb.get('inv_categories','select=*&order=name'),
    sb.get('inv_items','select=*&order=name'),
    sb.get('inv_log','select=*&order=ts.desc&limit=60'),
  ]);
  return{
    users:users.map(u=>{return{id:u.id,username:u.username,password:u.password,display:u.display||u.username,role:u.role||'user'}}),
    cats:cats.map(c=>{return{id:c.id,name:c.name,icon:c.icon||'📦'}}),
    items:items.map(i=>{return{id:i.id,name:i.name,cid:i.cat_id,qty:Number(i.qty)||0,unit:i.unit||'',min:Number(i.min_qty)||0,loc:i.loc||'',sku:i.sku||'',note:i.note||''}}),
    log:log.map(l=>{return{ts:new Date(l.ts).getTime(),item:l.item_name,action:l.action,user:l.username}}),
  };
}
