<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RASA OG">
<meta name="theme-color" content="#141410">
<title>RASA OG – Team Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141410;
  --surface:#1e1e1a;
  --card:#272722;
  --border:#38382e;
  --gold:#c9a84c;
  --gold2:#e8c876;
  --red:#8B0000;
  --red2:#b22222;
  --text:#f0ebe0;
  --muted:#9a9070;
  --green:#3d7a52;
  --green2:#5aab6f;
  --blue:#3a6a9a;
  --radius:10px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:15px;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
button:active{opacity:.75}
input,textarea,select{font-family:inherit;outline:none;font-size:16px !important}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── SCREENS: alle versteckt, active macht sichtbar ── */
#setup-screen{ display:none }
#pin-screen{   display:none }
#app-screen{   display:none }

#setup-screen.active{ display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px }
#pin-screen.active{   display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px }
#app-screen.active{   display:flex; flex-direction:column; min-height:100vh }

/* ── LOGIN BOX ── */
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 22px;width:100%;max-width:400px}
.logo-row{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.logo-icon{width:48px;height:48px;background:var(--red);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;flex-shrink:0}
.logo-text{font-size:20px;font-weight:900;color:var(--gold2);letter-spacing:.04em}
.logo-sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--gold);display:block;margin-bottom:5px}
.field-input{background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:12px 13px;width:100%;margin-bottom:12px;display:block}
.field-input:focus{border-color:var(--gold)}
.btn-primary{background:var(--gold);color:#111;border-radius:8px;padding:13px 22px;font-weight:800;font-size:15px;width:100%;display:block;margin-bottom:8px}
.btn-secondary{background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:11px 18px;font-size:13px;font-weight:600;width:100%;display:block;text-align:center}
.partner-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.partner-btn{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:16px 10px;text-align:center;font-weight:700;font-size:14px;color:var(--text);width:100%}
.partner-btn:active{border-color:var(--gold);color:var(--gold)}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;flex-shrink:0}
.topbar-logo{font-weight:900;font-size:15px;color:var(--gold2);letter-spacing:.04em;padding:13px 0}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.sync-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--muted);font-size:12px;font-weight:600}
.sync-btn.syncing{color:var(--gold);border-color:var(--gold)}
.sync-btn.ok{color:var(--green2);border-color:var(--green2)}
.sync-btn.err{color:var(--red2);border-color:var(--red2)}
.logout-btn{background:none;color:var(--muted);font-size:12px;padding:6px 8px}
.user-badge{font-size:12px;color:var(--gold);font-weight:700}

/* ── NAV TABS ── */
.nav-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{background:none;border:none;border-bottom:2px solid transparent;padding:11px 15px;font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}
.nav-tab.active{border-bottom-color:var(--gold);color:var(--gold)}

/* ── CONTENT ── */
.content{flex:1;padding:14px;max-width:900px;width:100%;margin:0 auto;overflow-x:hidden}
@media(max-width:600px){.content{padding-bottom:80px}}

/* ── NAV BOTTOM ON MOBILE ── */
@media(max-width:600px){
  .nav-tabs{position:fixed;bottom:0;left:0;right:0;z-index:150;border-top:1px solid var(--border);border-bottom:none}
}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-accent-gold{border-left:3px solid var(--gold)}
.card-accent-red{border-left:3px solid var(--red2)}
.card-accent-green{border-left:3px solid var(--green2)}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
@media(min-width:500px){.stats-row{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.stat-val{font-size:26px;font-weight:900}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

/* ── FORM ── */
.fi{margin-bottom:10px}
.fi label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--gold);display:block;margin-bottom:4px}
.fi input,.fi select,.fi textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:10px 11px;width:100%}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--gold)}
.fi textarea{resize:vertical;min-height:70px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:500px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
.btn-gold{background:var(--gold);color:#111;border-radius:7px;padding:10px 18px;font-weight:800;font-size:13px}
.btn-sm{background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:7px 11px;font-size:13px}
.btn-danger{background:rgba(178,34,34,.12);color:var(--red2);border:1px solid rgba(178,34,34,.25);border-radius:6px;padding:7px 11px;font-size:13px;font-weight:700}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

/* ── TAGS ── */
.tag{display:inline-block;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700}
.tag-gold{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.tag-muted{background:rgba(154,144,112,.1);color:var(--muted);border:1px solid rgba(154,144,112,.2)}
.tag-green{background:rgba(90,171,111,.15);color:var(--green2);border:1px solid rgba(90,171,111,.3)}
.tag-red{background:rgba(178,34,34,.15);color:var(--red2);border:1px solid rgba(178,34,34,.3)}
.tag-blue{background:rgba(58,106,154,.15);color:#6aade8;border:1px solid rgba(58,106,154,.3)}

/* ── KOMMENTARE ── */
.komm-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.komm-item{background:var(--bg);border-left:2px solid rgba(201,168,76,.4);border-radius:5px;padding:7px 11px;margin-bottom:6px}
.komm-meta{font-size:11px;color:var(--muted);margin-bottom:3px}
.komm-text{font-size:13px;color:var(--text)}
.komm-input-row{display:grid;grid-template-columns:95px 1fr 44px;gap:6px;margin-top:8px;align-items:center}
.komm-toggle{background:none;border:1px solid var(--border);border-radius:5px;padding:6px 12px;font-size:12px;color:var(--muted);font-weight:600}
.expandable{display:none}
.expandable.open{display:block}

/* ── ZUTATEN REIHE ── */
.zrow{display:grid;grid-template-columns:2fr 1fr 65px 85px 36px;gap:5px;margin-bottom:6px;align-items:center}
.zrow input,.zrow select{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:8px 8px;width:100%}
@media(max-width:540px){.zrow{grid-template-columns:1fr 70px 36px}.zrow .z-menge,.zrow .z-einh{display:none}}
.rzrow{display:grid;grid-template-columns:2fr 1fr 36px;gap:6px;margin-bottom:6px;align-items:center}
.rzrow input{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:8px 8px;width:100%}

/* ── KF RESULT ── */
.kf-result{background:var(--bg);border-radius:7px;padding:12px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:500px){.kf-result{grid-template-columns:repeat(4,1fr)}}
.kf-result-item{text-align:center}
.kf-result-label{font-size:10px;color:var(--muted);text-transform:uppercase}
.kf-result-val{font-size:17px;font-weight:800}

/* ── TOAST ── */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 22px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.5);pointer-events:none;white-space:nowrap}
.toast.ok{border-color:var(--green2);color:var(--green2)}
.toast.err{border-color:var(--red2);color:var(--red2)}
.toast.info{border-color:var(--gold);color:var(--gold)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:500px){.modal-bg{align-items:center;padding:20px}}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:24px 20px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
@media(min-width:500px){.modal-box{border-radius:14px}}
.modal-title{font-weight:800;font-size:17px;color:var(--gold2);margin-bottom:16px}

.empty{text-align:center;color:var(--muted);padding:40px 16px;font-size:13px;line-height:1.6}
.section-title{font-weight:800;font-size:18px;color:var(--gold2);margin-bottom:3px}
.section-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
</style>
</head>

  <div class="modal-box" id="pw-modal-inner"></div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<script>
// ═══════════════════════════════════════════
//  CONFIG & STATE
// ═══════════════════════════════════════════
// Default passwords — stored in Supabase rasa_users, changeable by each user
const DEFAULT_USERS = [
  {id:'u_roland',  name:'Roland',  password:'rasa1', color:'var(--gold)'},
  {id:'u_andrea',  name:'Andrea',  password:'rasa2', color:'#6aade8'},
  {id:'u_andreas', name:'Andreas', password:'rasa3', color:'#5aab6f'},
  {id:'u_sandra',  name:'Sandra',  password:'rasa4', color:'#e07a5f'},
];
let USERS = [...DEFAULT_USERS]; // will be overwritten from Supabase

let SB_URL = '', SB_KEY = '';
let currentUser = null;
let currentTab = 'home';

// Local data cache
let DB = { kalkulationen: [], rezepte: [], beitraege: [] };

// ═══════════════════════════════════════════
//  SUPABASE XHR HELPER (same as energie.html)
// ═══════════════════════════════════════════
function sbReq(method, table, body, query, cb) {
  const url = SB_URL + '/rest/v1/' + table + (query ? '?' + query : '');
  const xhr = new XMLHttpRequest();
  xhr.open(method, url, true);
  xhr.setRequestHeader('apikey', SB_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SB_KEY);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Prefer', 'return=representation');
  xhr.withCredentials = false;
  xhr.timeout = 15000;
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    const ok = xhr.status >= 200 && xhr.status < 300;
    let data = null;
    try { data = JSON.parse(xhr.responseText); } catch(e) { data = xhr.responseText; }
    cb(ok, data, xhr.status);
  };
  xhr.ontimeout = function() { cb(false, 'Timeout', 0); };
  xhr.onerror = function() { cb(false, 'Netzwerkfehler', 0); };
  xhr.send(body ? JSON.stringify(body) : null);
}

function sbGet(table, query, cb) { sbReq('GET', table, null, query, cb); }
function sbPost(table, body, cb) { sbReq('POST', table, body, null, cb); }
function sbPatch(table, id, body, cb) { sbReq('PATCH', table, body, 'id=eq.' + id, cb); }
function sbDelete(table, id, cb) { sbReq('DELETE', table, null, 'id=eq.' + id, cb); }

// Table: rasa_daten | columns: id (text PK), typ (text), daten (jsonb), geaendert (bigint)
function sbSave(typ, id, obj, cb) {
  if (typ === 'rasa_users') {
    // Save directly to rasa_users table
    sbPost('rasa_users', obj, function(ok, data, status) {
      if (ok) { cb && cb(true); return; }
      sbPatch('rasa_users', id, obj, function(ok2) { cb && cb(ok2); });
    });
    return;
  }
  const row = { id: id, typ: typ, daten: obj, geaendert: Date.now() };
  sbPost('rasa_daten', row, function(ok, data, status) {
    if (ok) { cb && cb(true); return; }
    // Conflict → PATCH
    sbPatch('rasa_daten', id, { daten: obj, geaendert: Date.now() }, function(ok2) { cb && cb(ok2); });
  });
}

function sbLoadAll(cb) {
  sbGet('rasa_daten', 'order=geaendert.desc', function(ok, data) {
    if (!ok || !Array.isArray(data)) { cb(false); return; }
    DB.kalkulationen = [];
    DB.rezepte = [];
    DB.beitraege = [];
    data.forEach(row => {
      if (row.typ === 'kalkulation') DB.kalkulationen.push(row.daten);
      else if (row.typ === 'rezept') DB.rezepte.push(row.daten);
      else if (row.typ === 'beitrag') DB.beitraege.push(row.daten);
    });
    cb(true);
  });
}

function sbDeleteEntry(id, cb) { sbDelete('rasa_daten', id, cb); }

// ═══════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════
function saveSetup() {
  const url = document.getElementById('setup-url').value.trim().replace(/\/$/, '');
  const key = document.getElementById('setup-key').value.trim();
  if (!url || !key) { showToast('URL und Key eingeben!', 'err'); return; }
  localStorage.setItem('rasa_sb_url', url);
  localStorage.setItem('rasa_sb_key', key);
  SB_URL = url; SB_KEY = key;
  showPinScreen();
}

function resetSetup() {
  if (!confirm('Verbindung zurücksetzen?')) return;
  localStorage.removeItem('rasa_sb_url');
  localStorage.removeItem('rasa_sb_key');
  location.reload();
}

// ═══════════════════════════════════════════
//  PIN SCREEN
// ═══════════════════════════════════════════
let selectedUser = null;

function showPinScreen() {
  document.getElementById('setup-screen').classList.remove('active');
  document.getElementById('pin-screen').classList.add('active');
  renderPartnerBtns();
  // Load users from Supabase in background
  sbGet('rasa_users', 'order=name.asc', function(ok, data) {
    if (ok && Array.isArray(data) && data.length) {
      USERS = data;
      renderPartnerBtns();
    }
  });
}

function renderPartnerBtns() {
  const el = document.getElementById('partner-btns');
  el.innerHTML = USERS.map((u,i) =>
    `<button class="partner-btn" onclick="selectUser(${i})">
      <div style="font-size:22px;margin-bottom:4px;color:${u.color||'var(--gold)'}">👤</div>
      <div style="font-weight:700">${u.name}</div>
    </button>`
  ).join('');
}

function selectUser(i) {
  selectedUser = USERS[i];
  document.getElementById('partner-select-area').style.display = 'none';
  document.getElementById('pw-entry-area').style.display = 'block';
  document.getElementById('pw-name-label').textContent = selectedUser.name;
  document.getElementById('pw-input').value = '';
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}

function backToPartnerSelect() {
  document.getElementById('partner-select-area').style.display = 'block';
  document.getElementById('pw-entry-area').style.display = 'none';
  selectedUser = null;
}

function doLogin() {
  if (!selectedUser) return;
  const pw = document.getElementById('pw-input').value;
  if (pw !== selectedUser.password) {
    showToast('Falsches Passwort!', 'err');
    document.getElementById('pw-input').value = '';
    return;
  }
  currentUser = selectedUser;
  enterApp();
}

function logout() {
  clearInterval(autoSyncTimer);
  autoSyncTimer = null;
  currentUser = null;
  document.getElementById('app-screen').classList.remove('active');
  backToPartnerSelect();
  document.getElementById('pin-screen').classList.add('active');
}

// ═══════════════════════════════════════════
//  APP ENTRY
// ═══════════════════════════════════════════
let autoSyncTimer = null;

function enterApp() {
  document.getElementById('pin-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  document.getElementById('user-label').textContent = currentUser.name;
  showTab('home');
  syncAll();
  // Auto-Sync alle 30 Sekunden
  clearInterval(autoSyncTimer);
  autoSyncTimer = setInterval(function() {
    silentSync();
  }, 30000);
}

function silentSync() {
  // Sync im Hintergrund ohne Toast/Spinner
  const dot = document.getElementById('live-dot');
  if (dot) { dot.style.opacity = '1'; dot.style.background = 'var(--gold)'; }
  sbLoadAll(function(ok) {
    if (ok) {
      renderTab(currentTab);
      if (dot) { dot.style.background = 'var(--green)'; dot.style.opacity = '0.7'; }
    } else {
      if (dot) { dot.style.background = 'var(--red2)'; dot.style.opacity = '1'; }
    }
  });
}

function openPwChange() {
  const html = `
    <div style="font-weight:800;font-size:16px;color:var(--gold2);margin-bottom:16px">🔑 Passwort ändern</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px">Passwort für <strong style="color:var(--gold)">${currentUser.name}</strong></div>
    <div class="fi"><label>Aktuelles Passwort</label><input id="cpw-old" type="password" class="field-input" placeholder="Aktuelles Passwort"></div>
    <div class="fi"><label>Neues Passwort</label><input id="cpw-new" type="password" class="field-input" placeholder="Neues Passwort" onkeydown="if(event.key==='Enter')savePwChange()"></div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn-primary" style="flex:1" onclick="savePwChange()">Speichern</button>
      <button class="btn-secondary" style="flex:1" onclick="document.getElementById('pw-modal').style.display='none'">Abbrechen</button>
    </div>`;
  document.getElementById('pw-modal-inner').innerHTML = html;
  document.getElementById('pw-modal').style.display = 'flex';
}

function savePwChange() {
  const oldPw = document.getElementById('cpw-old').value;
  const newPw = document.getElementById('cpw-new').value.trim();
  if (oldPw !== currentUser.password) { showToast('Aktuelles Passwort falsch!', 'err'); return; }
  if (!newPw || newPw.length < 3) { showToast('Neues Passwort zu kurz (min. 3 Zeichen)', 'err'); return; }
  currentUser.password = newPw;
  // Update in USERS array
  const idx = USERS.findIndex(u => u.id === currentUser.id);
  if (idx >= 0) USERS[idx].password = newPw;
  // Save to Supabase
  const obj = {...currentUser};
  sbSave('rasa_users', currentUser.id, obj, function(ok) {
    if (ok) {
      showToast('Passwort gespeichert ✓', 'ok');
      document.getElementById('pw-modal').style.display = 'none';
    } else {
      showToast('Fehler beim Speichern', 'err');
    }
  });
}

function showTab(name) {
  currentTab = name;
  ['home','kalk','rezepte','austausch'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((btn, i) => {
    const tabs = ['home','kalk','rezepte','austausch'];
    btn.classList.toggle('active', tabs[i] === name);
  });
  renderTab(name);
}

function renderTab(name) {
  if (name === 'home') renderHome();
  else if (name === 'kalk') renderKalk();
  else if (name === 'rezepte') renderRezepte();
  else if (name === 'austausch') renderAustausch();
}

// ═══════════════════════════════════════════
//  SYNC
// ═══════════════════════════════════════════
function syncAll() {
  const btn = document.getElementById('sync-btn');
  btn.textContent = '↻ Lädt…';
  btn.className = 'sync-btn syncing';
  sbLoadAll(function(ok) {
    if (ok) {
      btn.textContent = '✓ Sync';
      btn.className = 'sync-btn ok';
      showToast('Synchronisiert ✓', 'ok');
      renderTab(currentTab);
    } else {
      btn.textContent = '✗ Fehler';
      btn.className = 'sync-btn err';
      showToast('Sync-Fehler – Verbindung prüfen', 'err');
    }
    setTimeout(() => { btn.textContent = '↻ Sync'; btn.className = 'sync-btn'; }, 2500);
  });
}

// ═══════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmt(n) { return (parseFloat(n)||0).toFixed(2).replace('.',',') + ' €'; }
function nowStr() {
  return new Date().toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

let toastTimer = null;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type||'info');
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const KALK_KATS = ['Würstel / Grill','Getränke','Beilage','Snack','Sonstiges'];

function renderKalk() {

  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    ${['Alle',...KALK_KATS].map(k=>`<button class="btn-outline" style="padding:5px 12px;font-size:12px;${kalkFilter===k?'border-color:var(--gold);color:var(--gold)':''}" onclick="setKalkFilter('${k}')">${k}</button>`).join('')}

        </div>
      </div>

      <div class="expandable" id="kkomm-${escHtml(k.id)}">

          <div class="komm-input-row">

function toggleExpand(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}
function toggleKomm(id) { toggleExpand(id); }

function setKalkFilter(f) { kalkFilter = f; renderKalk(); }

function addKalkKomm(kid) {
  const textEl = document.getElementById('kkommtext-' + kid);
  const autorEl = document.getElementById('kkommautor-' + kid);
  const text = textEl ? textEl.value.trim() : '';
  if (!text) return;
  const autor = autorEl ? autorEl.value : currentUser.name;
  const k = DB.kalkulationen.find(x=>x.id===kid);
  if (!k) return;
  if (!k.kommentare) k.kommentare = [];
  k.kommentare.push({id:uid(), autor, text, datum:nowStr()});
  sbSave('kalkulation', kid, k, function(ok) {
    if (ok) { showToast('Kommentar gespeichert', 'ok'); renderKalk(); }
    else showToast('Fehler beim Speichern', 'err');
  });
}

function deleteKalk(id) {
  if (!confirm('Kalkulation löschen?')) return;
  DB.kalkulationen = DB.kalkulationen.filter(k=>k.id!==id);
  sbDeleteEntry(id, function(ok) {
    if (ok) { showToast('Gelöscht', 'ok'); renderKalk(); }
    else showToast('Fehler', 'err');
  });
}

function openKalkForm(id) {
  kalkFormId = id;

    <div id="kf-result" style="background:var(--bg);border-radius:7px;padding:12px;margin-bottom:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;display:none"></div>

    <div class="fi"><label>Foto</label><input type="file" id="kf-foto" accept="image/*" onchange="previewFoto()"><img id="kf-foto-preview" class="foto-preview" style="display:${v('foto')?'block':'none'}" src="${escHtml(v('foto'))}"></div>

  </div>`;

  document.getElementById('kalk-form-area').innerHTML = formHtml;
  recalc();
  document.getElementById('kalk-form-card').scrollIntoView({behavior:'smooth',block:'start'});
}

function zRow(z, i) {
  const EINH = ['g','kg','ml','l','Stk','Pkg'];
  return `<div class="zrow" id="zrow-${i}">
    <input class="kf-zname" placeholder="Zutat" value="${escHtml(z.name||'')}" oninput="recalc()">
    <input class="kf-zmenge z-menge" placeholder="Menge" value="${escHtml(z.menge||'')}">
    <select class="kf-zeinh z-einh">${EINH.map(e=>`<option${e===z.einheit?' selected':''}>${e}</option>`).join('')}</select>
    <input class="kf-zpreis" type="number" step="0.01" placeholder="€" value="${escHtml(z.preis||'')}" oninput="recalc()">
    <button class="btn-danger" style="padding:8px" onclick="removeZRow(${i})">✕</button>
  </div>`;
}

let zRowCount = 0;
function addZRow() {
  const container = document.getElementById('kf-zutaten');
  const idx = container.querySelectorAll('[id^=zrow-]').length + (++zRowCount);
  const div = document.createElement('div');
  div.innerHTML = zRow({name:'',menge:'',einheit:'g',preis:''}, idx);
  container.appendChild(div.firstElementChild);
}

function removeZRow(i) {
  const el = document.getElementById('zrow-' + i);
  if (el) el.remove();
  recalc();
}

function recalc() {
  const prices = [...document.querySelectorAll('.kf-zpreis')].map(i=>parseFloat(i.value)||0);
  const warenkosten = prices.reduce((a,b)=>a+b, 0);
  const verp = parseFloat(document.getElementById('kf-verp')?.value)||0;
  const pers = parseFloat(document.getElementById('kf-pers')?.value)||0;
  const total = warenkosten + verp + pers;
  const vk = parseFloat(document.getElementById('kf-vk')?.value)||0;
  const db = vk - total;
  const auf = total > 0 ? (db/total*100) : 0;
  const el = document.getElementById('kf-result');
  if (!el) return;
  if (total > 0 || vk > 0) {
    el.style.display = 'grid';
    el.innerHTML = [
      {l:'Warenkosten',v:fmt(warenkosten),c:'var(--muted)'},
      {l:'Gesamtkosten',v:fmt(total),c:'var(--muted)'},
      {l:'Deckungsbeitrag',v:fmt(db),c:db>=0?'var(--green)':'var(--red2)'},
      {l:'Aufschlag',v:auf.toFixed(1)+' %',c:auf>=60?'var(--green)':'var(--gold)'},
    ].map(x=>`<div style="text-align:center"><div style="font-size:10px;color:var(--muted);text-transform:uppercase">${x.l}</div><div style="font-size:17px;font-weight:800;color:${x.c}">${x.v}</div></div>`).join('');
  } else {
    el.style.display = 'none';
  }
}

function previewFoto() {
  const file = document.getElementById('kf-foto')?.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('kf-foto-preview');
    if (img) { img.src = e.target.result; img.style.display = 'block'; }
  };
  reader.readAsDataURL(file);
}

function gatherZutaten() {
  const names = [...document.querySelectorAll('.kf-zname')].map(i=>i.value.trim());
  const mengen = [...document.querySelectorAll('.kf-zmenge')].map(i=>i.value.trim());
  const einh = [...document.querySelectorAll('.kf-zeinh')].map(i=>i.value);
  const preise = [...document.querySelectorAll('.kf-zpreis')].map(i=>parseFloat(i.value)||0);
  return names.map((n,i)=>({name:n,menge:mengen[i],einheit:einh[i],preis:preise[i]})).filter(z=>z.name);
}

function saveKalk() {
  const name = document.getElementById('kf-name')?.value.trim();
  if (!name) { showToast('Produktname eingeben!', 'err'); return; }
  const zutaten = gatherZutaten();
  const warenkosten = zutaten.reduce((s,z)=>s+(parseFloat(z.preis)||0),0);
  const verp = parseFloat(document.getElementById('kf-verp')?.value)||0;
  const pers = parseFloat(document.getElementById('kf-pers')?.value)||0;
  const totalKosten = warenkosten + verp + pers;
  const vk = parseFloat(document.getElementById('kf-vk')?.value)||0;
  const db = vk - totalKosten;
  const auf = totalKosten > 0 ? (db/totalKosten*100) : 0;
  const fotoPreview = document.getElementById('kf-foto-preview');
  const foto = fotoPreview && fotoPreview.style.display !== 'none' ? fotoPreview.src : '';

  const existing = kalkFormId ? DB.kalkulationen.find(x=>x.id===kalkFormId) : null;
  const obj = {
    id: kalkFormId || uid(),
    name,
    kategorie: document.getElementById('kf-kat')?.value,
    autor: document.getElementById('kf-autor')?.value,
    vk, verpackung: verp, personal: pers,
    warenkosten, totalKosten, deckungsbeitrag: db, aufschlag: auf,
    zutaten,
    notiz: document.getElementById('kf-notiz')?.value.trim(),
    foto,
    datum: existing?.datum || nowStr(),
    kommentare: existing?.kommentare || [],
  };

  if (existing) {
    DB.kalkulationen = DB.kalkulationen.map(x=>x.id===obj.id?obj:x);
  } else {
    DB.kalkulationen.push(obj);
  }

  sbSave('kalkulation', obj.id, obj, function(ok) {
    if (ok) { showToast('Gespeichert ✓', 'ok'); closeKalkForm(); renderKalk(); }
    else showToast('Fehler beim Speichern', 'err');
  });
}

function closeKalkForm() {
  document.getElementById('kalk-form-area').innerHTML = '';
  kalkFormId = null;
}

      ${r.zubereitung ? `<div style="margin-top:10px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-bottom:5px">Zubereitung</div><div style="font-size:13px;color:var(--muted);white-space:pre-line;line-height:1.6">${escHtml(r.zubereitung)}</div></div>` : ''}

function addRezeptKomm(rid) {
  const textEl = document.getElementById('rkommtext-' + rid);

  const text = textEl ? textEl.value.trim() : '';
  if (!text) return;
  const r = DB.rezepte.find(x=>x.id===rid);

  if (!r.kommentare) r.kommentare = [];
  r.kommentare.push({id:uid(), autor: autorEl?autorEl.value:currentUser.name, text, datum:nowStr()});
  sbSave('rezept', rid, r, function(ok) {
    if (ok) { showToast('Kommentar gespeichert', 'ok'); renderRezepte(); }
    else showToast('Fehler', 'err');
  });
}

function deleteRezept(id) {
  if (!confirm('Rezept löschen?')) return;
  DB.rezepte = DB.rezepte.filter(r=>r.id!==id);
  sbDeleteEntry(id, function(ok) {
    if (ok) { showToast('Gelöscht', 'ok'); renderRezepte(); }
    else showToast('Fehler', 'err');
  });
}

function rzRow(z, i) {
  return `<div class="rzrow" id="rzrow-${i}">
    <input class="rf-zname" placeholder="Zutat" value="${escHtml(z.name||'')}">
    <input class="rf-zmenge" placeholder="Menge" value="${escHtml(z.menge||'')}">
    <button class="btn-danger" style="padding:8px" onclick="removeRzRow(${i})">✕</button>
  </div>`;
}

let rzRowCount = 0;
function addRzRow() {
  const container = document.getElementById('rf-zutaten');
  const idx = container.querySelectorAll('[id^=rzrow-]').length + (++rzRowCount);
  const div = document.createElement('div');
  div.innerHTML = rzRow({name:'',menge:''}, idx);
  container.appendChild(div.firstElementChild);
}
function removeRzRow(i) { const el = document.getElementById('rzrow-'+i); if(el) el.remove(); }

function previewRFoto() {
  const file = document.getElementById('rf-foto')?.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('rf-foto-preview');
    if (img) { img.src = e.target.result; img.style.display = 'block'; }
  };
  reader.readAsDataURL(file);
}

function saveRezept() {
  const titel = document.getElementById('rf-titel')?.value.trim();
  if (!titel) { showToast('Titel eingeben!', 'err'); return; }
  const existing = rezeptFormId ? DB.rezepte.find(x=>x.id===rezeptFormId) : null;
  const fotoPreview = document.getElementById('rf-foto-preview');

    id: rezeptFormId || uid(),

    autor: document.getElementById('rf-autor')?.value,
    portionen: parseInt(document.getElementById('rf-port')?.value)||4,

    zutaten,

    tipps: document.getElementById('rf-tipps')?.value.trim(),

    datum: existing?.datum || nowStr(),

  if (existing) DB.rezepte = DB.rezepte.map(x=>x.id===obj.id?obj:x);

function closeRezeptForm() {

  const title = 'RASA OG – Team Portal';
  const text = 'RASA OG Team-App: Kalkulation, Rezepte und Austausch für alle Partner.';
  if (navigator.share) {
    navigator.share({ title, text, url }).catch(() => copyLink());
  } else {
    copyLink();
  }
}

function copyLink() {
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('Link kopiert! ✓', 'ok'));
  } else {
    // Fallback for older browsers
    const el = document.createElement('textarea');
    el.value = url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('Link kopiert! ✓', 'ok');
  }
}
